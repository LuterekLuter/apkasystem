name: Build & Release Android APK

on:
  push:
    branches: [main, master]
    tags:
      - "v*.*.*"   # np. v1.1.0 — wyzwala release
  pull_request:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q -d /opt/gradle gradle-8.4-bin.zip
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug

      # Wgraj APK jako artifact przy każdym pushu
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Stwórz GitHub Release gdy tag to v*.*.*
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
